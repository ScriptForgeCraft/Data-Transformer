<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Test Excel Parse</title>
</head>

<body>
    <h1>Upload aldina.xlsx</h1>
    <input type="file" id="exInput" />
    <pre id="output"></pre>

    <script type="module">
        import { isAlternatingLayout, hasHeaderRow } from "./src/excel/layout.js";
        import { parseExcelFile } from "./src/excel/excelParser.js";
        import * as XLSX from "xlsx";
        document.getElementById('exInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: "array" });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

            let log = "First 20 rows of Excel:\n";
            for (let i = 0; i < 20; i++) {
                log += i + ": " + (sheetData[i] ? sheetData[i].map(c => c !== null ? String(c).substring(0, 15) : 'null').join(' | ') : 'null') + "\n";
            }
            log += "\n\nhasHeaderRow returns length: " + (hasHeaderRow(sheetData) ? hasHeaderRow(sheetData).length : 0);

            log += "\n\nParsed Flats Output:\n";
            const flats = await parseExcelFile(file);
            log += JSON.stringify(flats.slice(0, 20), null, 2);
            document.getElementById('output').textContent = log;
        });
    </script>
</body>

</html>
